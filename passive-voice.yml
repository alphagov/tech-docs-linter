extends: existence
message: "Consider using active voice where appropriate."
level: warning
scope: sentence

# More selective passive pattern
tokens:
  - '\b(?:was|were|been|being)\s+(?:\w+ed|known|given|made|found|used|built|written|created|set|taken)\b'

# Ignore common low-value / acceptable cases
exceptions:
  - '\bmay be\b'
  - '\bcan be\b'
  - '\bcould be\b'
  - '\bshould be\b'
  - '\bwill be\b'
  - '\bis based on\b'
  - '\bis composed of\b'
  - '\bis defined as\b'
  - '\bis called\b'
  - '\bis known as\b'